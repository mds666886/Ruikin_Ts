services:
  backend:
    build: ./backend
    container_name: yanxi_backend
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: yanxi_frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: yanxi_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
